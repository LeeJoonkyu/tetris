services:
  - type: web
    name: tetris-api
    runtime: python
    plan: free
    region: singapore
    pythonVersion: "3.11"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://leejoonkyu.github.io
